<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AP2 Lernapp</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AP2" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <script>document.documentElement.dataset.theme = localStorage.getItem('ap2_theme') || 'dark';</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <button class="btn-hamburger" id="btn-hamburger" aria-label="Menü">☰</button>
    <a class="btn-back" href="index.html">←</a>
    <span class="header-title">AP2 Lernapp</span>
    <span class="header-streak" id="streak-display">🔥 0</span>
    <span class="header-due" id="due-display">0 fällig</span>
    <button class="btn-theme" id="btn-theme">☀️</button>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    const hamburger = document.getElementById('btn-hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    }
    hamburger.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });
    overlay.addEventListener('click', closeSidebar);
    sidebar.addEventListener('click', e => {
      if (window.innerWidth <= 768 && e.target.closest('.sidebar-item')) closeSidebar();
    });
  </script>
</body>
</html>
